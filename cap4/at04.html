<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Multimídia — Cap. 4 / Ativ. 4</title>
</head>
<body>
<header>
    <h1>Recursos Multimídia</h1>
</header>
<main>
    
    <figure>
        <video controls width="800" height="450"
               poster="poster-aula.jpg"
               preload="metadata">
            <source src="videos/aula-html.mp4" type="video/mp4">
            <source src="videos/aula-html.webm" type="video/webm">
            <track
                kind="subtitles"
                srclang="pt"
                src="legendas/aula-html.vtt"
                label="Português"
                default>
            <p>
                Seu navegador não suporta vídeo.
                <a href="videos/aula-html.mp4">Clique aqui para baixar.</a>
            </p>
        </video>
        <figcaption>
            Aula introdutória de HTML5. Fonte: material didático do curso.
        </figcaption>
    </figure>
    
    <figure>
        <audio controls preload="metadata">
            <source src="audios/podcast-html.mp3" type="audio/mpeg">
            <source src="audios/podcast-html.ogg" type="audio/ogg">
            <p>
                Seu navegador não suporta áudio.
                <a href="audios/podcast-html.mp3">Baixar áudio</a>
            </p>
        </audio>
        <figcaption>
            Episódio: Introdução ao HTML.
            <a href="transcricao.html">Ler transcrição</a>
        </figcaption>
    </figure>
    
    <figure>
        <iframe
            width="800"
            height="450"
            src="https://www.youtube-nocookie.com/embed/Fhy-5CtVkiM"
            title="Curso de HTML para iniciantes"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
        <figcaption>
            Vídeo: Curso de HTML para iniciantes.
            Canal: Curso em Vídeo.
            Plataforma: YouTube.
        </figcaption>
    </figure>
    
    <figure>
        <picture>
            <source
                media="(min-width: 768px)"
                srcset="img/banner-wide.jpg">
            <img
                src="img/banner-mobile.jpg"
                alt="Banner ilustrando tecnologias utilizadas no desenvolvimento web."
                width="800"
                height="450">
        </picture>
        <figcaption>
            Banner ilustrativo sobre desenvolvimento web adaptado para diferentes tamanhos de tela.
        </figcaption>
    </figure>
</main>
<footer>
    <p>
        Nome: Seu Nome<br>
        Matrícula: Sua Matrícula<br>
        Data: 26/06/2026
    </p>
</footer>
</body>
</html>
